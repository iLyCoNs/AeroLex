        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; margin-right: 0; }

    <!-- MOTOR JEDI DE TRIAGE LEGAL CHILENO Y ESTADO DE CAUSAS (SINGLE FILE)   -->
    <!-- ===================================================================== -->
    <script>
        const WHATSAPP_NUMBER = "56900000000"; // Tu número aquí

        // 1. BASE DE DATOS DE REQUISITOS CHILENOS (TRIAGE RULES)
        // Aquí mapeamos lo que el Secretario IA debe exigir según el área legal detectada.
        const triageRules = {
            familia: {
                question: "Los asuntos de Familia requieren documentación estricta para proceder en Tribunales. ¿Cuenta usted con el <strong>Certificado de Mediación Frustrada</strong> o <strong>Certificados del Registro Civil</strong> (Matrimonio/Nacimiento)?",
                options: [
                    { label: "Sí, tengo todo", nextState: "triage_success" },
                    { label: "No, ¿cómo los saco?", nextState: "help_familia_docs" },
                    { label: "Es urgente (VIF/Medida Cautelar)", nextState: "urgent_vif" }
                ],
                helpHTML: `Para iniciar cualquier demanda de alimentos o visitas, la ley exige pasar por mediación. Puede solicitarla con su <strong>ClaveÚnica</strong> en el portal oficial.<br>
                          <a href="https://mediacion.minjusticia.gob.cl/" target="_blank" class="gov-link"><i class="fas fa-external-link-alt"></i> Portal Mediación Chile</a><br>
                          <a href="https://www.registrocivil.cl/" target="_blank" class="gov-link"><i class="fas fa-id-card"></i> Registro Civil (Certificados)</a>`
            },
            laboral: {
                question: "Para evaluar la viabilidad de una demanda laboral, necesitamos revisar ciertos hitos. ¿Tiene en su poder la <strong>Carta de Despido</strong> o el <strong>Finiquito</strong> (firmado o con reserva de derechos)?",
                options: [
                    { label: "Sí, tengo los documentos", nextState: "triage_success" },
                    { label: "No me dieron nada (Despido Verbal)", nextState: "laboral_verbal" },
                    { label: "¿Dónde descargo mis cotizaciones?", nextState: "help_laboral_docs" }
                ],
                helpHTML: `Puede descargar sus certificados de cotizaciones y dejar constancias laborales directamente en la Dirección del Trabajo (Mi DT) usando su ClaveÚnica.<br>
                          <a href="https://midt.dirtrab.cl/" target="_blank" class="gov-link"><i class="fas fa-briefcase"></i> Portal Mi DT (Dirección del Trabajo)</a>`
            },
            inmobiliario: {
                question: "El Derecho Inmobiliario requiere precisión registral. Para estudiar su caso, ¿cuenta con el <strong>Certificado de Dominio Vigente</strong> o de <strong>Hipotecas y Gravámenes</strong> (GP)?",
                options: [
                    { label: "Sí, los tengo", nextState: "triage_success" },
                    { label: "Solo tengo las escrituras", nextState: "triage_success" },
                    { label: "No, ¿dónde los pido?", nextState: "help_inmobiliario_docs" }
                ],
                helpHTML: `Los certificados actualizados (máx. 30 días) se solicitan en el Conservador de Bienes Raíces (CBR) correspondiente a la comuna del inmueble.<br>
                          <a href="https://www.conservadores.cl/" target="_blank" class="gov-link"><i class="fas fa-home"></i> Red de Conservadores (CBR)</a>`
            },
            default: {
                question: "Para que nuestro equipo jurídico analice su requerimiento con la máxima rigurosidad, ¿cuenta actualmente con documentación de respaldo (contratos, correos, resoluciones)?",
                options: [
                    { label: "Sí, poseo antecedentes", nextState: "triage_success" },
                    { label: "No, es solo una consulta", nextState: "triage_success" }
                ],
                helpHTML: ""
            }
        };

        // 2. BASE DE DATOS SIMULADA DE ESTADOS DE CAUSA
        const casesDB = {
            "ALX-2026-01": {
                materia: "Cuidado Personal y Alimentos",
                tribunal: "2° Juzgado de Familia de Santiago",
                rit: "C-1450-2025",
                estadoActual: 2, // Índice del paso actual
                steps: [
                    { title: "Ingreso de Demanda", date: "12 Mar 2026", done: true },
                    { title: "Notificación a Contraparte", date: "25 Mar 2026", done: true },
                    { title: "Audiencia Preparatoria", date: "Fijada para 15 May 2026", done: false },
                    { title: "Audiencia de Juicio", date: "Pendiente", done: false },
                    { title: "Sentencia Definitiva", date: "Pendiente", done: false }
                ]
            },
            "ALX-2026-02": {
                materia: "Despido Injustificado",
                tribunal: "1° Juzgado de Letras del Trabajo",
                rit: "O-321-2026",
                estadoActual: 4,
                steps: [
                    { title: "Ingreso Demanda", date: "02 Ene 2026", done: true },
                    { title: "Audiencia Preparatoria", date: "10 Feb 2026", done: true },
                    { title: "Audiencia de Juicio", date: "05 Mar 2026", done: true },
                    { title: "Sentencia (Favorable)", date: "20 Mar 2026", done: true },
                    { title: "Gestión de Cobro / Embargo", date: "En curso", done: false }
                ]
            }
        };

        // 3. LÓGICA DEL DIALOG NATIVO Y CHAT
        const aiModal = document.getElementById('ai-modal');
        const aiChatLog = document.getElementById('ai-chat-log');
        const aiInput = document.getElementById('ai-input');
        const aiSendBtn = document.getElementById('ai-send-btn');
        
        let triageContext = { area: 'default', service: '', data: '' };

        function openAIChat(triggerData = null) {
            aiModal.showModal(); // API Nativa de HTML5 Dialog
            
            if (triggerData === 'ESTADO_CAUSA') {
                aiChatLog.innerHTML = ''; // Limpiamos chat
                injectBotMessage("Módulo de Rastreo Judicial activado. Por favor, <strong>ingrese su número de caso asignado por AeroLex</strong> (Ej: ALX-2026-01).");
                return;
            }

            if (triggerData === 'GREETING_ONLY' && aiChatLog.children.length <= 1) {
                injectBotMessage("Bienvenido al sistema de Triage Técnico de <strong>AeroLex</strong>. Nuestro objetivo es perfilar su caso legal antes de derivarlo a un abogado especialista. ¿En qué área requiere asistencia?");
            }

            if (typeof triggerData === 'object') {
                triageContext.area = triggerData.areaId;
                triageContext.service = triggerData.serviceTitle;
                
                addUserMessage(`Solicito evaluación para: ${triggerData.serviceTitle}`);
                
                // Buscar reglas de triage
                const rule = triageRules[triggerData.areaId] || triageRules.default;
                
                let responseHTML = `Iniciando protocolo de análisis para <strong>${triggerData.serviceTitle}</strong>.<br><br>${rule.question}`;
                injectBotMessage(responseHTML, rule.options);
            }
        }

        function closeAIChat() {
            aiModal.close();
        }

        // ==========================================
        // RENDERIZADO DE MENSAJES (Efecto Jedi)
        // ==========================================
        function addUserMessage(text) {
            const msgHtml = `<div class="ai-chat-bubble-user fade-in">${text}</div>`;
            aiChatLog.insertAdjacentHTML('beforeend', msgHtml);
            scrollToBottom();
        }

        function injectBotMessage(htmlContent, options = null) {
            // Eliminar botones rápidos anteriores para que no se puedan volver a pulsar
            document.querySelectorAll('.quick-replies').forEach(el => el.remove());

            const typingId = 'typing-' + Date.now();
            const typingHtml = `<div id="${typingId}" class="ai-chat-bubble-bot typing-indicator"><span></span><span></span><span></span></div>`;
            aiChatLog.insertAdjacentHTML('beforeend', typingHtml);
            scrollToBottom();

            setTimeout(() => {
                document.getElementById(typingId)?.remove();
                
                let finalHTML = `<div class="ai-chat-bubble-bot fade-in">${htmlContent}`;
                
                // Inyectar botones si existen
                if (options) {
                    finalHTML += `<div class="quick-replies">`;
                    options.forEach(opt => {
                        finalHTML += `<button class="quick-reply-btn" onclick="handleQuickReply('${opt.nextState}', '${opt.label}')">${opt.label}</button>`;
                    });
                    finalHTML += `</div>`;
                }
                
                finalHTML += `</div>`;
                aiChatLog.insertAdjacentHTML('beforeend', finalHTML);
                scrollToBottom();
            }, 800);
        }

        function scrollToBottom() {
            setTimeout(() => { aiChatLog.scrollTop = aiChatLog.scrollHeight; }, 50);
        }

        // ==========================================
        // MÁQUINA DE ESTADOS (Respuestas a Botones)
        // ==========================================
        window.handleQuickReply = function(nextState, labelTyped) {
            addUserMessage(labelTyped);
            
            const rule = triageRules[triageContext.area] || triageRules.default;

            if (nextState === 'triage_success' || nextState === 'urgent_vif') {
                let waText = encodeURIComponent(`Hola AeroLex. Vengo del Filtro IA.\nServicio requerido: ${triageContext.service}\nEstado de Documentos: ${labelTyped}`);
                let msg = `Excelente. Ha pasado el filtro técnico preliminar. <br><br>Su expediente está listo para ser revisado por un abogado especialista de nuestro equipo.<br>
                           <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${waText}" target="_blank" class="btn-wa-final"><i class="fab fa-whatsapp text-lg"></i> Iniciar Asesoría Humana</a>`;
                injectBotMessage(msg);
            } 
            else if (nextState.startsWith('help_')) {
                let msg = `Comprendo. No se preocupe, es un paso habitual. <br><br>${rule.helpHTML}<br><br>Le sugiero recopilar estos antecedentes y contactarnos a través de nuestra mesa central cuando los tenga, o si necesita que nosotros hagamos la gestión documental por usted.<br>
                           <a href="https://wa.me/${WHATSAPP_NUMBER}?text=Hola,%20necesito%20ayuda%20gestionando%20documentos%20para%20${encodeURIComponent(triageContext.service)}" target="_blank" class="btn-wa-final"><i class="fab fa-whatsapp"></i> Contactar para Gestión</a>`;
                injectBotMessage(msg);
            }
            else if (nextState === 'laboral_verbal') {
                let waText = encodeURIComponent(`URGENTE: Posible despido verbal. Plazo corriendo.`);
                injectBotMessage(`⚠️ <strong>Alerta Legal:</strong> El despido verbal es una vulneración grave. Existe un plazo muy corto para dejar constancia en la Inspección del Trabajo e interponer acciones de tutela. <br><br>Derivando su caso de urgencia a un abogado laboralista ahora mismo.<br>
                                 <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${waText}" target="_blank" class="btn-wa-final bg-red-600"><i class="fab fa-whatsapp"></i> Hablar URGENTE</a>`);
            }
        };

        // ==========================================
        // PROCESADOR DE TEXTO LIBRE (Input de usuario)
        // ==========================================
        aiInputForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = aiInput.value.trim();
            if (!text) return;
            
            aiInput.value = '';
            aiSendBtn.disabled = true;
            addUserMessage(text);

            // DETECCIÓN: ESTADO DE CAUSA
            if (text.toUpperCase().startsWith("ALX-")) {
                const caseData = casesDB[text.toUpperCase()];
                if (caseData) {
                    renderCaseTracker(caseData, text.toUpperCase());
                } else {
                    injectBotMessage("❌ No he encontrado registros en la base de datos para el código proporcionado. Verifique e intente nuevamente, o contacte a secretaría.");
                }
                return;
            }

            // Fallback Genérico si escriben en vez de usar botones
            let waText = encodeURIComponent(`Consulta libre desde Bot: ${text.substring(0,50)}...`);
            injectBotMessage(`He registrado su comentario en la bitácora técnica. Debido a la naturaleza de su solicitud, he habilitado un canal directo con nuestro equipo jurídico para analizar los detalles.<br>
                             <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${waText}" target="_blank" class="btn-wa-final"><i class="fab fa-whatsapp"></i> Conectar con Abogado</a>`);
        });

        aiInput.addEventListener('input', () => { aiSendBtn.disabled = aiInput.value.trim() === ''; });

        // ==========================================
        // RENDERIZADO DEL TRACKER DE CAUSA (TIMELINE UI)
        // ==========================================
        function renderCaseTracker(caseData, code) {
            let html = `<strong>Expediente: ${code}</strong><br>
                        <span class="text-[11px] text-mac-dark/60 uppercase tracking-wide">Materia: ${caseData.materia}</span><br>
                        <span class="text-[11px] text-mac-dark/60">Tribunal: ${caseData.tribunal} | RIT: ${caseData.rit}</span>
                        <div class="timeline-container mt-4">`;
            
            caseData.steps.forEach((step, index) => {
                const isActive = index <= caseData.estadoActual;
                html += `
                    <div class="timeline-step ${isActive ? 'active' : ''}">
                        <div class="step-title text-[13px] ${isActive ? 'text-mac-dark' : 'text-mac-dark/40'}">${step.title}</div>
                        <div class="text-[10px] ${isActive ? 'text-green-600 font-medium' : 'text-mac-dark/40'}">${step.date}</div>
                    </div>`;
            });
            
            html += `</div>
                     <a href="https://oficinajudicialvirtual.pjud.cl/" target="_blank" class="gov-link w-full text-center mt-2"><i class="fas fa-university"></i> Ver expediente oficial (PJUD)</a>`;
            
            injectBotMessage(html);
        }

        // ==========================================
        // RENDERIZADO DEL CORE SYSTEM (La Base de Datos de la Web)
        // ==========================================
        const db = {
            legal: [
                { 
                    id: 'familia', title: 'Derecho de Familia', icon: 'fa-users', desc: 'Protección patrimonial y resolución de conflictos familiares.', 
                    items: [
                        { title: "Juicios de Alimentos", desc: "Fijación, aumento, rebaja y apremios por no pago." },
                        { title: "Divorcios Complejos", desc: "Mutuo acuerdo y unilaterales con compensación económica." },
                        { title: "Cuidado Personal", desc: "Protección del interés superior del menor y visitas." }
                    ] 
                },
                { 
                    id: 'laboral', title: 'Derecho Laboral', icon: 'fa-user-tie', desc: 'Defensa corporativa y representación de trabajadores.', 
                    items: [
                        { title: "Despido Injustificado", desc: "Cobro de indemnizaciones legales y recargos." },
                        { title: "Tutela Laboral", desc: "Defensa ante vulneración de derechos fundamentales." },
                        { title: "Accidentes del Trabajo", desc: "Responsabilidad y demanda indemnizatoria." }
                    ] 
                },
                { 
                    id: 'inmobiliario', title: 'Derecho Inmobiliario', icon: 'fa-city', desc: 'Seguridad jurídica en bienes raíces y proyectos.', 
                    items: [
                        { title: "Estudio de Títulos", desc: "Auditoría preventiva antes de la compraventa." },
                        { title: "Redacción de Escrituras", desc: "Compraventas, promesas y usufructos." },
                        { title: "Saneamiento", desc: "Regularización de propiedades e inscripciones." }
                    ] 
                }
            ]
        };

        const navLegal = document.getElementById('sidebar-nav');
        const contentTitle = document.getElementById('content-title');
        const contentDesc = document.getElementById('content-desc');
        const contentIcon = document.getElementById('content-icon');
        const servicesGrid = document.getElementById('services-grid');
        let currentActiveBtn = null;

        function renderContent(dataObj, btnElement) {
            if (currentActiveBtn) currentActiveBtn.classList.remove('active');
            btnElement.classList.add('active');
            currentActiveBtn = btnElement;

            contentTitle.innerHTML = dataObj.title;
            contentDesc.textContent = dataObj.desc;
            contentIcon.className = `fas ${dataObj.icon} text-3xl`;
            
            servicesGrid.innerHTML = '';
            
            dataObj.items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'service-widget fade-in p-5';
                card.style.animationDelay = `${index * 0.05}s`;
                
                // Aquí enlazamos la tarjeta con la IA y pasamos el área para el triage correcto
                card.onclick = () => {
                    openAIChat({ areaId: dataObj.id, serviceTitle: item.title });
                };

                card.innerHTML = `
                    <div class="flex flex-col gap-2">
                        <h4 class="text-[15px] font-bold text-mac-dark">${item.title}</h4>
                        <p class="text-[13px] text-mac-dark/70 leading-relaxed">${item.desc}</p>
                        <span class="text-[10px] font-semibold text-mac-accent mt-2 uppercase tracking-wide flex items-center gap-1"><i class="fas fa-magic"></i> Analizar Caso</span>
                    </div>`;
                servicesGrid.appendChild(card);
            });
        }

        db.legal.forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.className = 'sidebar-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium text-mac-dark/70 flex items-center gap-3 mb-1';
            btn.innerHTML = `<i class="fas ${cat.icon} w-5 text-center opacity-60"></i> <span>${cat.title}</span>`;
            
            btn.addEventListener('click', () => renderContent(cat, btn));
            navLegal.appendChild(btn);
            if (index === 0) setTimeout(() => btn.click(), 50);
        });
    </script>
</body>
</html>
