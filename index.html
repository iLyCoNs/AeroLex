                { 
                    id: 'empresas', title: 'Servicios a Empresas', icon: 'fa-building', desc: 'Externalización de la inteligencia legal y técnica para el blindaje de la empresa moderna.', 
                    items: [

                        { title: "Regularización de activos", desc: "Saneamiento de propiedades y maquinarias de la compañía." },
                        { title: "Asesoría para licitaciones", desc: "Estrategia técnica para la adjudicación de contratos." },
                        { title: "Recuperación de activos", desc: "Persecución civil y penal para reintegro de bienes." },
                        { title: "Estudios corporativos", desc: "Análisis de sociedades objetivo para futuras inversiones." },

                    ] 
                }

        };

        // ==========================================
        // 2. REGLAS DE TRIAGE DE LA IA
        // ==========================================
        const triageRules = {
            familia: {
                question: "Los asuntos de Familia requieren documentación estricta para proceder en Tribunales. ¿Cuenta usted con el <strong>Certificado de Mediación Frustrada</strong> o <strong>Certificados del Registro Civil</strong>?",
                options: [
                    { label: "Sí, tengo todo", nextState: "triage_success" },
                    { label: "No, ¿cómo los saco?", nextState: "help_familia_docs" },
                    { label: "Es urgente (VIF/Medida Cautelar)", nextState: "urgent_vif" }
                ],
                helpHTML: `Para iniciar demandas de alimentos o visitas, la ley exige pasar por mediación. Puede solicitarla con su <strong>ClaveÚnica</strong>.<br>
                          <a href="https://mediacion.minjusticia.gob.cl/" target="_blank" class="gov-link"><i class="fas fa-external-link-alt"></i> Portal Mediación Chile</a>`
            },
            laboral: {
                question: "Para evaluar la viabilidad de una acción laboral, necesitamos ciertos hitos. ¿Tiene en su poder la <strong>Carta de Despido</strong> o el <strong>Finiquito</strong> (firmado o con reserva de derechos)?",
                options: [
                    { label: "Sí, tengo los documentos", nextState: "triage_success" },
                    { label: "No me dieron nada (Despido Verbal)", nextState: "laboral_verbal" },
                    { label: "¿Dónde descargo mis cotizaciones?", nextState: "help_laboral_docs" }
                ],
                helpHTML: `Puede descargar sus cotizaciones en la Dirección del Trabajo (Mi DT).<br>
                          <a href="https://midt.dirtrab.cl/" target="_blank" class="gov-link"><i class="fas fa-briefcase"></i> Portal Mi DT</a>`
            },
            inmobiliario: {
                question: "El Derecho Inmobiliario requiere precisión registral. ¿Cuenta con el <strong>Certificado de Dominio Vigente</strong> o de <strong>Hipotecas y Gravámenes</strong> (GP)?",
                options: [
                    { label: "Sí, los tengo", nextState: "triage_success" },
                    { label: "Solo tengo las escrituras", nextState: "triage_success" },
                    { label: "No, ¿dónde los pido?", nextState: "help_inmobiliario_docs" }
                ],
                helpHTML: `Los certificados actualizados (máx. 30 días) se solicitan en el Conservador de Bienes Raíces (CBR) respectivo.<br>
                          <a href="https://www.conservadores.cl/" target="_blank" class="gov-link"><i class="fas fa-home"></i> Red de Conservadores (CBR)</a>`
            },
            default: {
                question: "Para que nuestro equipo analice su requerimiento con la máxima rigurosidad, ¿cuenta actualmente con documentación de respaldo (contratos, correos, antecedentes)?",
                options: [
                    { label: "Sí, poseo antecedentes", nextState: "triage_success" },
                    { label: "No, es solo una consulta", nextState: "triage_success" }
                ],
                helpHTML: ""
            }
        };

        // ==========================================
        // 3. RENDERIZADO DEL CORE SYSTEM (La magia del DOM)
        // ==========================================
        const navLegal = document.getElementById('sidebar-nav');
        const navTech = document.getElementById('sidebar-nav-tech');
        const contentTitle = document.getElementById('content-title');
        const contentDesc = document.getElementById('content-desc');
        const contentIcon = document.getElementById('content-icon');
        const servicesGrid = document.getElementById('services-grid');
        let currentActiveBtn = null;

        function renderContent(dataObj, btnElement) {
            if (currentActiveBtn) currentActiveBtn.classList.remove('active');
            btnElement.classList.add('active');
            currentActiveBtn = btnElement;

            contentTitle.innerHTML = dataObj.title;
            contentDesc.textContent = dataObj.desc;
            contentIcon.className = `fas ${dataObj.icon} text-2xl`;
            
            servicesGrid.innerHTML = '';
            
            dataObj.items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'service-widget fade-in p-5';
                card.style.animationDelay = `${index * 0.04}s`;
                
                card.onclick = () => openAIChat({ areaId: dataObj.id, serviceTitle: item.title });

                card.innerHTML = `
                    <div class="flex flex-col gap-2">
                        <h4 class="text-[14px] font-bold text-mac-dark leading-tight">${item.title}</h4>
                        <p class="text-[12px] text-mac-dark/70 leading-relaxed">${item.desc}</p>
                        <span class="text-[10px] font-semibold text-mac-accent mt-1 uppercase tracking-wide flex items-center gap-1"><i class="fas fa-robot"></i> Analizar Caso con IA</span>
                    </div>`;
                servicesGrid.appendChild(card);
            });
        }

        function createSidebarButtons(categoryArray, container) {
            categoryArray.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = 'sidebar-item w-full text-left px-3 py-2.5 rounded-lg text-[13px] font-medium text-mac-dark/80 flex items-center gap-3 mb-1';
                btn.innerHTML = `<i class="fas ${cat.icon} w-5 text-center opacity-60"></i> <span>${cat.title}</span>`;
                
                btn.addEventListener('click', () => {
                    renderContent(cat, btn);
                    if(window.innerWidth < 768) document.getElementById('content-header').scrollIntoView({ behavior: "smooth", block: "start" });
                });
                
                container.appendChild(btn);
                
                // Auto-click el primer elemento (Derecho Civil) para que no salga "Cargando..."
                if (index === 0 && cat.id === 'civil') setTimeout(() => btn.click(), 50);
            });
        }

        createSidebarButtons(db.legal, navLegal);
        createSidebarButtons(db.tech, navTech);


        // ==========================================
        // 4. LÓGICA DEL DIALOG (IA) Y CHAT
        // ==========================================
        const aiModal = document.getElementById('ai-modal');
        const aiChatLog = document.getElementById('ai-chat-log');
        const aiInput = document.getElementById('ai-input');
        const aiSendBtn = document.getElementById('ai-send-btn');
        let triageContext = { area: 'default', service: '', data: '' };

        function openAIChat(triggerData = null) {
            aiModal.showModal();
            
            if (triggerData === 'ESTADO_CAUSA') {
                aiChatLog.innerHTML = ''; 
                injectBotMessage("Módulo de Rastreo Judicial. Por favor, <strong>ingrese su número de caso asignado</strong> (Ej: ALX-2026-01).");
                return;
            }

            if (triggerData === 'GREETING_ONLY' && aiChatLog.children.length <= 1) {
                injectBotMessage("Bienvenido al sistema de Triage Técnico. ¿En qué área requiere asistencia?");
            }

            if (typeof triggerData === 'object') {
                triageContext.area = triggerData.areaId;
                triageContext.service = triggerData.serviceTitle;
                
                addUserMessage(`Solicito evaluación para: ${triggerData.serviceTitle}`);
                
                const rule = triageRules[triggerData.areaId] || triageRules.default;
                let responseHTML = `Iniciando protocolo de análisis para <strong>${triggerData.serviceTitle}</strong>.<br><br>${rule.question}`;
                injectBotMessage(responseHTML, rule.options);
            }
        }

        function closeAIChat() { aiModal.close(); }

        function addUserMessage(text) {
            const msgHtml = `<div class="ai-chat-bubble-user fade-in">${text}</div>`;
            aiChatLog.insertAdjacentHTML('beforeend', msgHtml);
            scrollToBottom();
        }

        function injectBotMessage(htmlContent, options = null) {
            document.querySelectorAll('.quick-replies').forEach(el => el.remove());
            const typingId = 'typing-' + Date.now();
            aiChatLog.insertAdjacentHTML('beforeend', `<div id="${typingId}" class="ai-chat-bubble-bot typing-indicator"><span></span><span></span><span></span></div>`);
            scrollToBottom();

            setTimeout(() => {
                document.getElementById(typingId)?.remove();
                let finalHTML = `<div class="ai-chat-bubble-bot fade-in">${htmlContent}`;
                if (options) {
                    finalHTML += `<div class="quick-replies">`;
                    options.forEach(opt => { finalHTML += `<button class="quick-reply-btn" onclick="handleQuickReply('${opt.nextState}', '${opt.label}')">${opt.label}</button>`; });
                    finalHTML += `</div>`;
                }
                finalHTML += `</div>`;
                aiChatLog.insertAdjacentHTML('beforeend', finalHTML);
                scrollToBottom();
            }, 800);
        }

        function scrollToBottom() { setTimeout(() => { aiChatLog.scrollTop = aiChatLog.scrollHeight; }, 50); }

        window.handleQuickReply = function(nextState, labelTyped) {
            addUserMessage(labelTyped);
            const rule = triageRules[triageContext.area] || triageRules.default;

            if (nextState === 'triage_success' || nextState === 'urgent_vif') {
                let waText = encodeURIComponent(`Hola AeroLex. Vengo del Filtro IA.\nServicio: ${triageContext.service}\nDocumentos: ${labelTyped}`);
                injectBotMessage(`Excelente. Su expediente está listo para ser revisado por un abogado especialista.<br>
                           <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${waText}" target="_blank" class="btn-wa-final"><i class="fab fa-whatsapp text-lg"></i> Iniciar Asesoría Humana</a>`);
            } else if (nextState.startsWith('help_')) {
                injectBotMessage(`Comprendo. No se preocupe.<br><br>${rule.helpHTML}<br><br>Le sugiero recopilar estos antecedentes o contactarnos para ayudarle con la gestión.<br>
                           <a href="https://wa.me/${WHATSAPP_NUMBER}?text=Hola,%20necesito%20ayuda%20gestionando%20documentos" target="_blank" class="btn-wa-final"><i class="fab fa-whatsapp"></i> Contactar para Gestión</a>`);
            } else if (nextState === 'laboral_verbal') {
                injectBotMessage(`⚠️ <strong>Alerta Legal:</strong> El despido verbal tiene un plazo muy corto. Derivando de urgencia a un abogado laboralista.<br>
                                 <a href="https://wa.me/${WHATSAPP_NUMBER}?text=URGENTE: Despido verbal" target="_blank" class="btn-wa-final bg-red-600"><i class="fab fa-whatsapp"></i> Hablar URGENTE</a>`);
            }
        };

        aiInputForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = aiInput.value.trim();
            if (!text) return;
            
            aiInput.value = '';
            aiSendBtn.disabled = true;
            addUserMessage(text);

            if (text.toUpperCase().startsWith("ALX-")) {
                // Simulación Estado de Causa
                if(text.toUpperCase() === "ALX-2026-01") {
                    injectBotMessage(`<strong>Expediente: ${text.toUpperCase()}</strong><br><span class="text-[11px] uppercase">Familia - Alimentos</span><div class="mt-3 text-sm text-green-600 font-bold">● Ingreso de Demanda (Completado)</div><div class="text-sm text-mac-dark/50">○ Audiencia (Pendiente)</div>`);
                } else {
                    injectBotMessage("❌ No he encontrado registros en la base de datos.");
                }
                return;
            }

            let waText = encodeURIComponent(`Consulta libre: ${text.substring(0,50)}...`);
            injectBotMessage(`He registrado su comentario. Habilitando canal directo para analizar detalles.<br>
                             <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${waText}" target="_blank" class="btn-wa-final"><i class="fab fa-whatsapp"></i> Conectar con Abogado</a>`);
        });

        aiInput.addEventListener('input', () => { aiSendBtn.disabled = aiInput.value.trim() === ''; });
    </script>
</body>
